<!DOCTYPE html>
<html lang="th">
<link rel="stylesheet" href="style.css">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบเช็คชื่อนักเรียน (Face Recognition)</title>
</head>
<header>
    <nav>
        <ul>
            <li>
                <a href="id-list.html">Data Student</a>
                <a href="#">#</a>
                <a href="#">#</a>
                <a href="#">#</a>

            </li>
        </ul>
    </nav>
</header>
<body>

    <header class="dashboard-header">
        <h1>ระบบเช็คชื่อนักเรียนอัจฉริยะ</h1>
        <div class="stats-container">
            <div class="stat-box">ยอดรวม: <span>-</span> คน</div>
            <div class="stat-box">ขึ้นรถแล้ว: <span>-</span> คน</div>
            <div class="stat-box">ยังไม่มา: <span>-</span> คน</div>
        </div>
    </header>

    <main class="dashboard-main">

        <section class="camera-zone">
            <h2>สแกนใบหน้า (Live Camera)</h2>
            <div class="video-container">
                <video id="webcam-feed" autoplay muted width="640" height="480"></video>
            </div>
            <p id="camera-status">สถานะ: รอตรวจจับใบหน้า...</p>
        </section>

        <aside class="log-zone">
            <h2>บันทึกการเข้าล่าสุด </h2>
            
            <ul class="log-list">
                
                <li class="log-id">
                    <div class="student-info">
                        <strong></strong>
                        <span class="student-id">รหัส: </span>
                    </div>
                    <div class="status-badge success">
                        
                    </div>
                </li>

                <li class="log-id">
                    <div class="student-info">
                        <strong></strong>
                        <span class="student-id">รหัส: -</span>
                    </div>
                    <div class="status-badge success">
                        
                    </div>
                </li>

            </ul>
        </aside>

    </main>

    <script src="script.js"></script>
    
</body>

</html>
